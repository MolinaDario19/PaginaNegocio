<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitud de Software - Challenger TV</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #003366; /* Azul Challenger */
            --accent-color: #d32f2f;  /* Rojo para resaltar */
            --bg-color: #f4f7f6;
            --text-color: #333;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: var(--primary-color);
            border-bottom: 3px solid var(--primary-color);
            padding-bottom: 10px;
        }

        .instruction-box {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 20px;
        }

        /* Responsive: Imagen y Formulario uno al lado del otro en PC */
        @media (min-width: 768px) {
            .instruction-box {
                flex-direction: row;
                align-items: flex-start;
            }
            .reference-img, .request-form {
                flex: 1;
            }
        }

        .reference-img img {
            width: 100%;
            border-radius: 8px;
            border: 2px solid #ddd;
            cursor: zoom-in;
        }

        .reference-img p {
            font-size: 0.9rem;
            color: #666;
            text-align: center;
            font-style: italic;
        }

        .request-form {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 8px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            color: var(--primary-color);
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box; /* Importante para que no se salga del contenedor */
            font-size: 1rem;
        }

        button {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            padding: 15px;
            border: none;
            border-radius: 5px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #002244;
        }

        .note {
            background: #fff3cd;
            border-left: 5px solid #ffeeba;
            padding: 10px;
            margin-top: 15px;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Solicitud de Firmware para TV</h1>

    <div class="instruction-box">
        <div class="reference-img">
            <label>Guía de Referencia:</label>
            <img src="./images/soft5.jpeg" alt="Referencia Etiqueta Challenger">
            <p>Ubica la etiqueta blanca en la parte trasera de tu televisor.</p>
        </div>

        <div class="request-form">
            <form id="softwareForm">
                <div class="form-group">
                    <label for="modelo">Modelo (Model):</label>
                    <input type="text" id="modelo" placeholder="Ej: LED 43KG34..." required>
                </div>
                <div class="form-group">
                    <label for="serie">Serie (Serial):</label>
                    <input type="text" id="serie" placeholder="Ej: 250411-03269" required>
                </div>
                <div class="form-group">
                    <label for="codigo">Código:</label>
                    <input type="text" id="codigo" placeholder="Ej: 18.84384.20" required>
                </div>
                <button type="submit">Enviar Solicitud por WhatsApp</button>
            </form>
            
            <div class="note">
                <strong>Nota:</strong> Estos datos son indispensables para asegurar que recibas el software correcto para tu pantalla.
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('softwareForm').addEventListener('submit', function(e) {
        e.preventDefault();

        // Obtener valores
        const modelo = document.getElementById('modelo').value;
        const serie = document.getElementById('serie').value;
        const codigo = document.getElementById('codigo').value;

        // Crear mensaje para WhatsApp
        const mensaje = `Hola, necesito el software para mi TV Challenger:%0A- Modelo: ${modelo}%0A- Serie: ${serie}%0A- Código: ${codigo}`;
        
        // Reemplaza con tu número de teléfono real (incluye código de país)
        const telefono = "573000000000"; 
        
        const url = `https://wa.me/${telefono}?text=${mensaje}`;

        // Redirigir
        window.open(url, '_blank');
    });
</script>

</body>
</html>
