window.uploadAllReviews = async function(){

const log =
document.getElementById("log");

for (let i=0;i<reviews.length;i++){

try{

const r = reviews[i];

log.innerHTML +=
`Subiendo ${r.name}...<br>`;

const response =
await fetch(r.image);

const blob =
await response.blob();

const storageRef =
ref(storage,
"reviews/"+Date.now()+"_"+r.name+".jpg");

await uploadBytes(
storageRef,
blob
);

const imageURL =
await getDownloadURL(storageRef);

await addDoc(
collection(db,"reviews"),
{

name:r.name,

comment:r.comment,

image:imageURL,

service:service,

email:email,

uid:uid,

userPhoto:userPhoto,

rating:
Math.random()>0.5 ? 5 : 4,

approved:true,

createdAt:new Date()

});

log.innerHTML +=
`✔ ${r.name} subida<br>`;

}
catch(error){

log.innerHTML +=
`❌ Error en ${r.name}<br>`;

console.error(error);

}

}
